name: Build and Upload
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    env:
      BASE_VERSION: "4.40.53"
      VERSION: "4.40.53.${{ github.run_number }}"
      MPV_DEV_VERSION: "20260331-git-9465b30"
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache .NET Framework 4.7.2 Reference Assemblies
      id: cache-net472
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\net472ref
        key: net472-ref-v1
    
    - name: Install .NET Framework 4.7.2 Reference Assemblies
      if: steps.cache-net472.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $extractPath = "${{ runner.temp }}\net472ref"
        Write-Host "Cache miss - downloading .NET Framework 4.7.2 Reference Assemblies..."
        $url = "https://www.nuget.org/api/v2/package/Microsoft.NETFramework.ReferenceAssemblies.net472/1.0.3"
        $nupkg = "$env:TEMP\net472ref.nupkg"
        $zipFile = "$env:TEMP\net472ref.zip"
        
        Invoke-WebRequest -Uri $url -OutFile $nupkg -UseBasicParsing
        Rename-Item -Path $nupkg -NewName $zipFile
        Expand-Archive -Path $zipFile -DestinationPath $extractPath -Force
        Write-Host "Download and extraction completed"
    
    - name: Copy Reference Assemblies to System Location
      shell: powershell
      run: |
        $sourcePath = "${{ runner.temp }}\net472ref\build\.NETFramework\v4.7.2"
        $targetPath = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7.2"
        
        if (Test-Path $sourcePath) {
          Write-Host "Copying reference assemblies from cache/download..."
          New-Item -ItemType Directory -Path $targetPath -Force
          Copy-Item -Path "$sourcePath\*" -Destination $targetPath -Recurse -Force
          Write-Host "Reference assemblies installed successfully"
        } else {
          Write-Error "Source path not found: $sourcePath"
          exit 1
        }
    
    - uses: microsoft/setup-msbuild@v2

    - name: Cache libmpv-2.dll (x86)
      id: cache-mpv
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\mpvdev\${{ env.MPV_DEV_VERSION }}
        key: mpv-dev-i686-${{ env.MPV_DEV_VERSION }}-v1

    - name: Download libmpv-2.dll (x86) from shinchiro releases
      if: steps.cache-mpv.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $version = "$env:MPV_DEV_VERSION"
        $cacheDir = "${{ runner.temp }}\mpvdev\$version"
        $assetNamePattern = "^mpv-dev-i686-$([regex]::Escape($version))\.(7z|zip)$"
        Write-Host "Resolving fixed mpv version: $version"

        $api = "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases?per_page=100"
        $releases = Invoke-RestMethod -Uri $api -Headers @{ Accept = "application/vnd.github+json" }

        $asset = $null
        foreach ($release in $releases) {
          $candidate = $release.assets |
            Where-Object { $_.name -match $assetNamePattern } |
            Select-Object -First 1
          if ($candidate) {
            $asset = $candidate
            break
          }
        }

        if (-not $asset) {
          Write-Error "Could not find x86 mpv-dev asset for fixed version: $version"
          exit 1
        }

        $archive = Join-Path $PWD $asset.name
        $extractDir = Join-Path $PWD "mpv-dev-extract"

        Write-Host "Downloading $($asset.name)"
        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive -UseBasicParsing

        if (Test-Path $extractDir) {
          Remove-Item -Recurse -Force $extractDir
        }
        New-Item -ItemType Directory -Path $extractDir | Out-Null

        if ($archive.EndsWith(".zip")) {
          Expand-Archive -Path $archive -DestinationPath $extractDir -Force
        } else {
          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) {
            $sevenZip = "${env:ProgramFiles(x86)}\7-Zip\7z.exe"
          }
          if (-not (Test-Path $sevenZip)) {
            Write-Error "7-Zip executable not found on runner."
            exit 1
          }
          & $sevenZip x $archive "-o$extractDir" -y | Out-Null
        }

        $dll = Get-ChildItem -Path $extractDir -Filter "libmpv-2.dll" -File -Recurse -ErrorAction SilentlyContinue |
          Select-Object -First 1

        if (-not $dll) {
          Write-Error "libmpv-2.dll not found in extracted archive."
          exit 1
        }

        New-Item -ItemType Directory -Path $cacheDir -Force | Out-Null
        Copy-Item -Path $dll.FullName -Destination (Join-Path $cacheDir "libmpv-2.dll") -Force
        Write-Host "libmpv-2.dll cached at $cacheDir"

    - name: Prepare libmpv-2.dll from cache
      shell: powershell
      run: |
        $version = "$env:MPV_DEV_VERSION"
        $cacheDir = "${{ runner.temp }}\mpvdev\$version"
        $cachedDll = Join-Path $cacheDir "libmpv-2.dll"

        if (-not (Test-Path $cachedDll)) {
          Write-Error "Cached libmpv-2.dll not found at: $cachedDll"
          exit 1
        }

        Copy-Item -Path $cachedDll -Destination (Join-Path $PWD "libmpv-2.dll") -Force
        Write-Host "libmpv-2.dll prepared at repository root"

    - name : Restore Packages
      run: msbuild XiboClient.sln /t:Restore /p:Configuration=Release /p:Platform="x86"
    
    - name: Build Solution
      run: msbuild XiboClient.sln /p:Configuration=Release /p:Platform="x86"

    - name: Cache WiX Toolset 3.11
      id: cache-wix
      uses: actions/cache@v4
      with:
        path: wix
        key: wix-3.11-binaries

    - name: Install WiX Toolset 3.11
      if: steps.cache-wix.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Write-Host "Cache miss - downloading WiX Toolset 3.11..."
        Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "wix.zip"
        Expand-Archive -Path "wix.zip" -DestinationPath "wix" -Force
        Write-Host "WiX Toolset download completed"

    - name: Add WiX to PATH
      shell: powershell
      run: |
        echo "$PWD\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Generate Dependencies Fragment
      shell: powershell
      run: |
        Write-Host "Generating dependencies fragment..."
        $binPath = "bin\x86\Release"
        $solutionDir = (Get-Location).Path
        .\wix\heat.exe dir $binPath -cg Dependencies -gg -srd -sfrag -dr PlayerFolder -var var.SourceDir -out heat-fragment.wxs

    - name: Compile WiX Objects
      shell: powershell
      run: |
        Write-Host "Compiling WiX objects..."
        $solutionDir = (Get-Location).Path
        $binPath = "bin\x86\Release"
        $version = "$env:VERSION"
        Write-Host "Building version: $version"
        .\wix\candle.exe installer.wxs -out installer.wixobj -dSourceDir="$solutionDir\$binPath" -dProductVersion="$version"
        .\wix\candle.exe heat-fragment.wxs -out heat-fragment.wixobj -dSourceDir="$solutionDir\$binPath"

    - name: Build MSI Package
      shell: powershell
      run: |
        Write-Host "Building MSI package..."
        $version = "$env:VERSION"
        $outputFile = "NOA-Player-v$version.msi"
        Write-Host "Output file: $outputFile"
        .\wix\light.exe installer.wixobj heat-fragment.wixobj -out $outputFile -ext WixUIExtension

    - uses: actions/upload-artifact@v4
      with:
        name: NOAPlayer-MSI-${{ env.VERSION }}
        path: NOA-Player-v${{ env.VERSION }}.msi